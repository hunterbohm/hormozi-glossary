- id: goose-and-the-eggs
  term: The Goose and the Eggs
  aliases:
  - Build a Sellable Company
  - Goose vs Eggs
  category: scaling
  short_def: The 'goose' is the core business that generates value; the 'eggs' are the sellable assets it lays — build the goose, sell the eggs.
  full_def: 'Hormozi separates the ''goose'' (the core engine that reliably produces value — audience, system, brand, capability) from the ''eggs'' (the discrete sellable outputs: products, services, roll-ups, an eventual company sale). To build a company worth selling someday, you focus on the goose and design it to lay valuable eggs, while removing what makes it un-sellable: keyman risk (dependence on the founder), lack of recurring revenue, and unproven demand for the eggs.'
  why_it_matters: 'It clarifies what actually gets valued in an exit: not this month''s revenue but the durable, owner-independent engine behind it. Building the goose (not just chasing eggs) is what turns a job you own into an asset you can sell.'
