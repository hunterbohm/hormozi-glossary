- id: epic-story-razor
  term: The Epic Story Razor (decision-making)
  aliases:
  - Most epic story
  - The story I will one day tell
  - Story as decision frame
  category: meta
  short_def: When unsure what to do, pick the option that will make the most epic story to tell — which is usually the long saga, not the shortcut.
  full_def: 'Hormozi offers a single heuristic for predicting his own behavior in hard moments: whatever will become the most epic story is what he''ll most likely do. Crucially, the most epic story is rarely the shortest, cleanest path to victory — it''s the long, hard saga that resolves into something big later. In the moment of a decision, framing the choice as "which story do I want to be able to tell?" turns hardship into narrative fuel and biases him toward the bolder, slower, higher-stakes path.'
  why_it_matters: 'It converts an abstract "be courageous" impulse into a concrete question you can ask at any fork, and it reframes present suffering as future storytelling capital — the worse it gets now, the more epic the story becomes. It also pairs with his documenting practice: capture the monster now so you can tell the story later, with yourself as the main beneficiary.'
