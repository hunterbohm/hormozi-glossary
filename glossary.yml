- id: engage
  term: Engage (a lead)
  aliases:
  - Engaging Leads
  category: leads
  short_def: To get a lead to show interest — to convert a contactable person into someone who has raised their hand.
  full_def: 'In Hormozi''s framing, ''to engage'' a lead is the specific job of advertising: get the person to take an action that signals interest in what you sell. You engage leads by giving them something they actually want — most powerfully a lead magnet — rather than immediately asking them to buy. Engagement is the bridge between having a contact (a lead) and having a prospect worth selling to (an engaged lead).'
  why_it_matters: Treating 'engage' as a distinct verb forces a mindset shift from taking (asking for the sale) to giving (offering value first). It clarifies that the point of a post, ad, or message is to earn a signal of interest, which is a far more achievable and measurable goal than a sale.
