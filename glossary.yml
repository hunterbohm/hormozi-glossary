- id: niche-slap
  term: Niche Slap
  aliases:
  - Niche slapping
  - Niche slapping people
  category: offers
  short_def: Forcing an entrepreneur who is running too many things at once to pick exactly one niche, because any of them could work but none will work unless only one is chosen.
  full_def: Niche slapping is Hormozi's coinage for the tough-love act of slapping a scattered entrepreneur into committing to a single niche. The reasoning is that when someone has three things going, any one of them could succeed, but none will succeed while all three are being pursued — so spreading attention is, in his view, an exercise in arrogance. The slap is the intervention that collapses the options down to one so execution can actually compound.
