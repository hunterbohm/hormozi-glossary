- id: attention-scarcest-resource
  term: Attention (the scarcest resource)
  category: mindset
  short_def: Attention, not time, is the entrepreneur's most valuable and most contested resource.
  full_def: Against the cliché that time is most precious, Hormozi argues attention is — successful people and businesses ruthlessly manage attention by killing distractions and saying no to diluting opportunities. Protecting focus requires an identity shift toward someone who guards their attention, which yields clarity and growth.
  why_it_matters: Everyone has the same hours; the constraint is where you point your mind — so guarding attention beats managing time.
