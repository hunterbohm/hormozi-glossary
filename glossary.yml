- id: guarantee-taxonomy
  term: The Guarantee (Risk Reversal) Taxonomy
  aliases:
  - Guarantees
  - Risk Reversal
  category: offers
  short_def: 'Four ways to reverse the buyer''s risk: unconditional, conditional, anti-guarantee, and implied/performance.'
  full_def: 'Hormozi frames a guarantee as a statement of the form ''If you don''t get X in Y time, we''ll do Z,'' whose entire job is to reverse the buyer''s biggest perceived risk. His four categories: (1) Unconditional - no-questions-asked refund, strongest for lowering the barrier to yes; (2) Conditional - refund only if the buyer does the work, which filters for committed customers; (3) Anti-Guarantee - explicitly NO refunds, all sales final, which signals confidence and forces commitment; (4) Implied / Performance-based - you get paid only when the customer gets the result (a partnership/results-based deal), the strongest form of risk reversal. Guarantees can be stacked and should be named.'
  components:
  - Unconditional
  - Conditional
  - Anti-Guarantee
  - Implied / Performance-Based
  why_it_matters: Guarantees attack the real reason people don't buy - fear the thing won't work - by moving the risk from buyer to seller. Counterintuitively, stronger guarantees usually LOWER refund rates because they attract confident, committed buyers.
  sources:
