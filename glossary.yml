- id: mental-toughness
  term: Mental Toughness
  aliases:
  - Tolerance, Fortitude, Resilience, Adaptability
  - Mental Toughness (as a skill)
  category: mindset
  short_def: 'Not an innate trait but a measurable skill: the odds a bad thing makes you act against your own goals.'
  full_def: 'Hormozi defines mental toughness as the percentage likelihood that, when something bad happens, you change your behavior in a way that works against your goals — so it''s a ''how much,'' not a ''yes/no.'' He breaks it into four measurable components: tolerance (how much hardship before your behavior changes), fortitude (how far you drop once it does), resilience (how fast you return to baseline), and adaptability (whether your new baseline is higher or lower than before).'
  formula: Mental toughness = f(tolerance, fortitude, resilience, adaptability)
  components:
  - Tolerance
  - Fortitude
  - Resilience
  - Adaptability
  why_it_matters: 'Splitting toughness into four gauges turns ''toughen up'' (useless advice) into targeted training — you can measure which component is weak and drill it. It reframes trauma too: since a permanent behavior change from a bad event can be positive, hardship can build strength into you rather than out of you.'
