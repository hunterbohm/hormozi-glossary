- id: legacy-is-a-myth
  term: Legacy (is a myth; education is the only real legacy)
  aliases:
  - Legacy is a myth
  - Individual legacy
  - The ultimate legacy is education
  category: meta
  short_def: Personal legacy — your name living on for generations — is a myth over any real time horizon; the only legacy that compounds is education passed to the next human who picks up the baton.
  full_def: 'Hormozi rejects "individual legacy" — the idea that your name or personal mark persists meaningfully — because stretched over enough generations nobody remembers anyone (you don''t know your own great-great-great-grandfather''s name). He treats wealth-without-skill inheritance as actively harmful, since unearned money ruins people. The one form he endorses is collective: education, the inventions and knowledge strangers left that make your life better now. The ultimate legacy is simply to learn lessons and pass them on so someone else carries the baton, and the ultimate wasted life is to learn lessons and pass them to no one.'
