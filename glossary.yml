- id: affiliate
  term: Affiliate
  aliases:
  - Affiliates
  - Partners
  - Promoters
  category: leads
  short_def: An independent business that promotes your stuff to its own audience in exchange for money, free stuff, or both.
  full_def: 'Hormozi defines an affiliate bluntly as ''a lead getter — somebody who gets you leads.'' Unlike a plain referral, an affiliate owns their own business, does their own advertising, and agrees to offer your stuff to their engaged leads for a reward (money, free stuff, or both). He notes the same role hides under many names — influencer, UGC creator, referral, joint venture, center of influence — but fundamentally they''re all ''people who tell other people about your stuff.'' The playbook: make an offer that''s a win for you, the affiliate, AND their audience; give pre-made, proven collateral (ads/posts/emails); provide custom links, a live leaderboard, and real-time support.'
  why_it_matters: Affiliates are one of the most scalable, capital-light ways to advertise in any niche — you rent other people's trusted audiences instead of paying platforms for cold reach. Framing the reward as a win for the affiliate's audience (not just the affiliate) is the non-obvious key that keeps them promoting without burning their goodwill.
