- id: winning-define-the-win
  term: Winning / Define the Win
  aliases:
  - Define the win
  - Impress your future self
  category: mindset
  short_def: Winning is impressing your future self and doing the actions you can fully control — not beating other people.
  full_def: Hormozi defines winning as impressing the only person who matters, future you — not comparing to people you're already beating or those ahead of you. Practically, you win by measuring yourself on whether you did the actions that make failure unreasonable, so success arrives 'by default.' He later re-defined winning for himself as simply working as hard as he possibly can on something, which unlocked far more sustained effort than external rewards.
  why_it_matters: Defining the win around controllable actions (not outcomes or rivals) makes winning a decision you can guarantee. It kills both complacency (comparing down) and despair (comparing up), and turns the scoreboard into 'did I do the reps?' — the one thing fully in your hands.
