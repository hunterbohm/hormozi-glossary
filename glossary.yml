  full_def: 'Hormozi argues motivation comes from deprivation and is proportional to the perceived gap: you''re motivated to eat when hungry, to drink when thirsty. With money and goals the deprivation is psychological, not physical — you only feel driven if you perceive a large gap. That''s why the rich often stay hungrier than the poor: they compare themselves to people even further ahead, widening the gap. Change who you compare yourself to and you change your motivation.'
