- id: burnout
  term: Burnout
  category: mindset
  short_def: Not a symptom of too much work, but of not getting out of the work what you wanted — the reward stretching too far apart.
  full_def: Hormozi rejects the idea that burnout comes from volume of work. He argues it comes when you stop getting from the work what you wanted to get — when the cadence of meaningful reward keeps extending, so you put in effort but the payoff arrives less and less often. You can be exhausted by a single easy task if the reward is gone, and tireless in hard work if the reward is frequent.
  why_it_matters: It moves the fix from 'rest more' to 'shorten your reward loop.' If burnout is about reward cadence, the answer is to engineer visible wins and meaning back into the work — not just to work less, which often doesn't touch the real cause.
  sources:
  - label: Alex Hormozi's definition of burnout (Reese Hopper, quoting IG video)
    url: https://www.reesehopper.com/blog/alex-hormozis-definition-of-burnout
  evidence:
  - quote: Burnout just means that the reward for the work that you're doing has habituated, so it no longer rewards you. You're not getting out of it what you wanted to get out of it.
    source: I Thought I Was Broken — I Just Had the Wrong Words
    url: https://www.youtube.com/watch?v=5f_UL-z1xgI
    kind: verbatim
  evidence_status: verified
