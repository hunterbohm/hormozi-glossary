- id: logo-vs-revenue-retention
  term: Logo Retention vs. Revenue Retention
  aliases:
  - Net Revenue Retention
  - NRR
  - Retention (two kinds)
  category: scaling
  short_def: Logo retention counts how many customers stayed; revenue retention counts how many dollars stayed — and dollars can exceed 100%.
  full_def: 'Hormozi distinguishes two retention numbers. Logo retention: of 100 customers in January, how many remain now — it can never exceed 100% and only decays. Revenue retention: of the dollars that cohort spent in January, how much do they spend now — this CAN exceed 100% (net revenue retention >100%) when the customers who stay expand their spend enough to offset the ones who left. He also splits churn into involuntary/structural churn (they moved, died, business closed) versus voluntary churn (they left because you suck), and shows churn spikes at months 1, 3, and 6, then drops to ~2%/month.'
  why_it_matters: It reveals that a business can be shrinking in customers yet growing in revenue — the holy grail, because it grows even if you acquire no one new. Chasing logo retention alone misses the bigger lever (expansion revenue) and the goal of >100% NRR.
  sources:
