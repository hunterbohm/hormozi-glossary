- id: hook-retain-reward
  term: Hook, Retain, Reward
  aliases:
  - The Content Unit
  - Hook Retain Reward
  category: leads
  short_def: 'The three components of any attention-winning piece of content: grab attention, hold it, then pay it off.'
  full_def: 'Hormozi''s ''content unit'' — the anatomy of every audience-growing piece of content — has three parts. HOOK: redirect attention and give a reason to stop scrolling (interesting topic, strong headline, native format); measured by the % who start consuming. RETAIN: keep attention using curiosity — open loops, lists, steps, and stories that make people wonder what''s next. REWARD: deliver the value that satisfies the reason they engaged, maximizing ''value per second,'' which is what makes people share and come back. The three can happen at once (a meme) but separating them lets you build content deliberately.'
  components:
  - Hook (grab attention)
  - Retain (hold attention with curiosity)
  - Reward (deliver value per second)
  why_it_matters: 'It turns ''go viral'' from luck into a repeatable structure with three diagnosable failure points: if content underperforms, you can pinpoint whether the hook, the retention, or the reward broke. It reframes content as an engineered attention transaction rather than art.'
