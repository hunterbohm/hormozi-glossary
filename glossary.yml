- id: customer-referrals
  term: Customer Referrals (Word of Mouth)
  aliases:
  - Referrals
  - Word of Mouth
  category: leads
  short_def: Getting existing customers to bring you new customers — the highest-converting, lowest-cost lead source.
  full_def: 'The first and most powerful lead getter. Hormozi frames referrals through a thought experiment (''you lose all customers but one, and may only get new customers from that one — what do you do?''): the answer is make a better product and engineer referrals. His six levers for more referrals map to the Value Equation — sell better-fit customers, set better expectations, get people better results faster, reduce their effort, and explicitly tell them what to do/buy next. Crucially, ask for the referral at the moment of purchase and via a three-way introduction, not just by collecting names.'
  why_it_matters: 'It reframes referrals from passive luck into a designable system, and reframes product quality as a marketing channel: a genuinely great, over-delivering product is the cheapest advertising you''ll ever run. ''The best source of new work is the work on your desk.'''
