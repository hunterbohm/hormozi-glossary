  category: offers
  short_def: Extra items added for free that make the core offer look like a steal - always better than discounting.
  full_def: 'Hormozi''s rule: a single offer is worth less than the SAME offer broken into components and re-presented as a stack of named bonuses. Bonuses raise perceived value without cutting price, whereas discounts teach buyers your prices are negotiable. Each bonus should target a specific obstacle, carry a benefit-driven name and a stated dollar value, and ideally the combined bonus value should eclipse the core offer. Advanced move: use other people''s products/services as bonuses (with affiliate deals).'
  why_it_matters: Bonuses let you increase value (X + Y for the same price) instead of destroying margin and price integrity (less X for less money). Reframing components as free bonuses is a pure perceived-value gain.
