  full_def: 'CLOSER is the acronym Hormozi distilled after studying hundreds of scripts and doing ~4,000 one-on-one sales: Clarify why they''re there; Label the problem; Overview their past pain; Sell the vacation (the outcome); Explain away concerns; Reinforce the decision. He pairs it with two rules — only three things should come out of your mouth on a call (questions, restatements of what the prospect said, and short anecdotal stories), and you never ask for the sale until the prospect has clarified their own problem.'
