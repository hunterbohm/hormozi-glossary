- id: client-financed-acquisition
  term: Client-Financed Acquisition (CFA)
  aliases:
  - CFA
  - Client-financed acquisition
  - Self-funding growth loop
  category: money-models
  short_def: Making a new customer's early gross profit repay their fully loaded acquisition cost, so growth can fund itself.
  full_def: Hormozi defines Client-Financed Acquisition as structuring the money model so a new customer's cumulative gross profit repays their fully loaded CAC quickly, ideally within 30 days. Gross profit is revenue minus direct fulfillment cost; CAC is the marketing and sales cost required to acquire the customer. Once gross profit exceeds CAC, the customer has repaid their own acquisition and that cash can be recycled into the next customer.
  why_it_matters: Removes cash and outside capital as the limit on growth. When acquisition is self-funding, you scale ad spend aggressively instead of cutting ads whenever cash gets tight — the difference between a 'good model' and a 'bad model.'
