  category: mindset
  short_def: The in-between phase where your old peers no longer fit but your results are not big enough yet to earn a new peer group.
  full_def: The Lonely Chapter is the social isolation that often comes with changing your standards before the outside world has rewarded you for it. You can outgrow old friendships before you have the achievements, network, or status that would make new friendships feel natural. Hormozi frames it as a normal chapter that ambitious people pass through, not a sign that you chose the wrong path.
