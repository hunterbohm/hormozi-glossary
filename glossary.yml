- id: give-give-give-ask
  term: Give-Give-Give-Ask
  aliases:
  - Give to Ask Ratio
  - Value First Advertising
  - Give More Ask Less
  category: leads
  short_def: Provide far more free value than you request in return, then occasionally ask for the sale.
  full_def: 'Hormozi''s value-first principle for monetizing an audience without burning goodwill: give a large amount of value repeatedly before making an ask, maintaining a heavy give-to-ask ratio. In content, this shows up as integrated offers (a short ''commercial'' inside long valuable content) or intermittent offers (one promotional post after many value posts). The idea is to maximize your ABILITY to ask (how much value you bank) times the number of times you ask — you can ask often only if you keep depositing value between asks. He explicitly warns against giving too little value, since a weak free experience actively damages your brand.'
  why_it_matters: 'It reframes the taker''s instinct (''ask for the sale now'') into a compounding trust account: goodwill is the currency that earns you the right to sell. Give enough and asking becomes welcome rather than annoying — the opposite of the constant-pitching that repels audiences.'
