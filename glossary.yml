- id: lead
  term: Lead
  aliases:
  - Leads
  category: leads
  short_def: A person you can contact — not a sale, not necessarily an interested person, just someone you have the ability to reach.
  full_def: 'Hormozi strips ''lead'' down to its most literal meaning: a lead is simply a person you can contact. An email address, a phone number, a LinkedIn connection, a follower, or a website visitor whose contact info you captured all count. He deliberately rejects the fuzzy industry usage (anyone who saw an ad, anyone ''interested'') because a contactable person is the concrete unit advertising actually produces. But he immediately warns that leads alone are nearly worthless — contactability without interest is a waste of time and money.'
  why_it_matters: 'Redefining a lead as ''someone you can contact'' turns a vague marketing buzzword into a countable inventory you can grow on purpose. It reframes the whole business problem: you never ''have no leads'' — everyone already owns a list (phone, email, social) — so the bottleneck is action and engagement, not access.'
