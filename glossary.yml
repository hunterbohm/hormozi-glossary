- id: trust
  term: Trust
  aliases:
  - Trustworthiness
  - Trust (as punishability)
  category: mindset
  short_def: Making yourself punishable by another person and betting they won't use it against you.
  full_def: 'Hormozi reframes trust as a concrete bet, not a warm feeling: to trust someone is to make yourself vulnerable (punishable) — share a secret, give your word — and wager they won''t exploit it. Whether to make that bet turns on two tests: (1) their track record of protecting what you''ve given them, and (2) whether betraying you would cost them more than it would benefit them (the incentive structure). A single betrayal erases years of it. Separately, his character screen for who to trust asks: can I trust this person with my life, my money, and my spouse?'
  formula: 'Trust the bet when: their track record of protection is clean AND cost-of-betrayal > benefit-of-betrayal'
  components:
  - Vulnerability (being punishable)
  - Track record of protecting what you gave them
  - Incentive structure (cost vs benefit of betraying you)
  why_it_matters: Turning trust into 'who can punish whom, and do their incentives protect me?' makes it a decision you can reason about instead of a gut feeling. It also tells you how to become trustworthy — guard what people give you and align incentives — and warns that breaking trust doesn't damage a relationship, it usually ends it.
  sources:
