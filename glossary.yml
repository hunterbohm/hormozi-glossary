- id: values-are-skills
  term: Values Are Just Skills
  aliases:
  - Values are skills
  category: mindset
  short_def: A value is not an abstract character trait but a behavioral short code — "when this happens, I do this" — and because it is a behavior, it can be trained like any other skill.
  full_def: 'Hormozi reframes values away from moral abstractions and into conditioned behaviors: a value is a short code that triggers a specific action in a specific situation (for example, loyalty means when offered a drink, I say no). Because the value is just a rehearsed behavior, it is trainable — you practice the response until the behavior is automatic. The implication is that you are not stuck with the values you currently have; you can install new ones through repetition.'
  why_it_matters: It converts a fixed-trait story ("that is just not who I am") into a trainable-behavior story, which moves values from the realm of identity you cannot change into the realm of practice you can — and makes living your values a matter of drilling the behavior rather than mustering willpower.
