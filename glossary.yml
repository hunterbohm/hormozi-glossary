- id: create-flow-monetize-flow-add-friction
  term: Create Flow, Monetize Flow, Add Friction
  aliases:
  - Create Flow Monetize Flow Add Friction
  category: offers
  short_def: First generate demand, then sell into it, then quietly reduce what you have to deliver.
  full_def: Hormozi's operating mantra for building and improving offers. Create flow = generate demand/leads (e.g. a bold promise like 'I'll fill your gym in 30 days'). Monetize flow = convert that demand into sales. Add friction = once demand and cash are flowing, reduce your delivery cost/effort for the same price (e.g. give a self-serve course instead of doing it for them). He pairs it with the observation that easy-to-sell things are hard to fulfill and vice versa - so you fund fixes by over-delivering first, then use the cashflow to solve the hard problems.
  why_it_matters: 'It sequences business-building correctly: prove demand and get paid BEFORE optimizing delivery. Trying to perfect fulfillment before you have flow is backwards.'
