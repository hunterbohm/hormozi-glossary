- id: confidence
  term: Confidence
  category: mindset
  short_def: Belief that comes from proof in your past, not from hyping yourself up in the present — and it's domain-specific.
  full_def: 'Hormozi defines confidence as a percentage likelihood built from evidence: the more times you''ve done a thing, the more proof you have that you can do it again. It comes from the past, not the present, and it''s domain-specific (you can be a confident salesperson and an insecure parent). You build it by doing the exact action, in the exact situation, so many times you get bored of it — you ''walk it before you talk it.'''
  why_it_matters: 'It debunks affirmations and self-talk: confidence isn''t decided, it''s earned through reps. Because it comes from stored proof, the lever is doing the real thing repeatedly until competence is undeniable — and ''if your plan requires luck, it''s a bad plan; dig the well before you''re thirsty.'''
  sources:
  - label: How to Win (At ANYTHING) (Rosetta)
    url: https://rosetta.to/u/alexhormozi/how-to-win-at-anything
  - label: Brutally Honest Advice to Build Your Confidence (Rosetta)
