  - Three A's objection framework
  category: sales
  short_def: 'A three-move way to reframe any objection: acknowledge it, associate it with good buyers, then ask a question.'
  full_def: 'Hormozi''s objection-reframing method. Acknowledge: repeat their concern back so they feel heard (and to buy yourself thinking time). Associate: tie the objection to behavior your best customers show (''great question — that actually shows you''re making a serious decision, which is exactly what our best customers do''). Ask: pose a question that regains control and surfaces the real concern. He bounds it with ethics rules and the ''straw man'' move — attribute hard truths to another client or authority so the prospect never feels attacked.'
