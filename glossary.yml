- id: leads-vs-sales-problem
  term: Sales Problem vs. Leads Problem (Constraint Diagnostic)
  aliases:
  - Is it a sales problem or a leads problem?
  - You don't have a lead problem, you have a traffic problem
  category: sales
  short_def: Before scaling spend, figure out whether you're failing to get enough prospects or failing to convert the ones you already get.
  full_def: Hormozi diagnoses growth complaints by isolating the actual binding constraint instead of reflexively buying 'more leads.' If your close rate is healthy but volume is low, the bottleneck is upstream — leads or traffic ('you don't have a lead problem, you have a traffic problem'). If plenty of people talk to you but few buy, it's a sales or offer problem (and a very high close rate, ~80%+, usually means you're underpriced by 3-4x, not that selling is 'solved'). Fix the constraint that's actually broken; don't pour money into the part that already works.
  why_it_matters: Stops owners from dumping cash into lead-gen when the real leak is conversion, pricing, or traffic — the classic misdiagnosis that just scales a broken funnel faster.
