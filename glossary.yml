- id: theory-of-constraints
  term: Theory of Constraints (Hormozi's application)
  aliases:
  - The Constraint
  - Find Your Constraint
  - The Bottleneck
  category: scaling
  short_def: A business grows only as fast as its single biggest bottleneck lets it, so you fix that one thing and ignore everything else.
  full_def: 'Hormozi borrows Goldratt''s Theory of Constraints and applies it to companies: at any moment one function is the true limiter on growth, and effort spent anywhere else is wasted. He argues the constraint is almost always OUTSIDE the founder''s zone of genius (founders keep polishing what they are already good at), so real growth comes from honestly finding the bottleneck and pouring resources into it until it is no longer the constraint.'
  why_it_matters: It replaces 'work on everything' with 'work on the ONE thing that is actually holding you back.' Reframing a business as a chain with a single weakest link makes prioritization objective instead of emotional, and stops you from optimizing parts that don't move the whole.
