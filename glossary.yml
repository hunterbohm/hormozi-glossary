- id: levels-of-advertisers
  term: The Levels of Advertisers (Advertising Roadmap)
  aliases:
  - Seven Levels of Advertisers
  - The Advertising Totem Pole
  - $100M Scaling Roadmap
  category: leads
  short_def: A leveled roadmap of advertiser sophistication, from telling your friends what you sell up to a full executive-run lead machine.
  full_def: 'Hormozi''s roadmap places every advertiser on a ''totem pole'' so they know their current level and the next primary action. In his framing it runs to seven levels: Level 1 — make your friends aware of what you sell (warm outreach); Level 2 — maximize your personal work capacity (warm outreach + content + paid ads with a lead magnet); Level 3 — hire employees to advertise on your behalf; Level 4 — make the product good enough for consistent referrals; Level 5 — advertise in more places, in more ways, with more people (2+ methods across multiple platforms); Level 6 — hire ''killers'' (experienced executives to run departments); Level 7 — Hormozi leaves open, to be written once he crosses a billion. (Note: sometimes loosely summarized as ~4–6 levels; the canonical book framing is seven.)'
  components:
  - L1 warm outreach to friends
  - L2 max personal capacity
  - L3 employees
  - L4 product-driven referrals
  - L5 multi-method/multi-platform
  - L6 hire experienced executives
  - L7 (billion+, TBD)
  why_it_matters: 'It gives a founder a diagnostic — ''where am I, and what''s the single next move?'' — so scaling advertising becomes a sequenced climb instead of doing everything at once. It also sets realistic expectations: reaching the top typically takes 5–10+ years.'
