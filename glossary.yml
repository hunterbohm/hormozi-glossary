- id: boredom
  term: Boredom
  category: mindset
  short_def: The name most people give to the unglamorous, repetitive work that mastery actually requires.
  full_def: Hormozi reframes boredom as a mislabel, not a verdict. 'Boring' is what most people call the work it takes to become the best — the same reps, the same routine, done long after novelty wears off. He argues that chasing novelty to escape boredom is what breaks compounding, and that tolerating boredom is a competitive advantage because most people won't.
  why_it_matters: If boredom is just the texture of mastery, then feeling bored is a sign you're on the right path, not a reason to switch. It reframes the urge to chase something new as the enemy of the compounding that makes people great.
  sources:
  - label: Alex Hormozi (Facebook, Jul 2024)
