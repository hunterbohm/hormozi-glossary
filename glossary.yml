- id: agency-as-apprenticeship
  term: Agency (as a Paid Apprenticeship)
  aliases:
  - Agencies
  - How to Use an Agency
  category: leads
  short_def: Hire a marketing agency to LEARN their skill, document it, then bring it in-house — not to outsource forever.
  full_def: 'Hormozi redefines the right use of an agency. Most founders hire one to permanently outsource marketing and stay ignorant of it — a mistake. His reframe: treat the agency as an intensive, paid training program. Hire an expert agency for a defined period, get them to teach you their methods and platforms while running your ads, document the process, run both teams in parallel until yours beats theirs, then transition execution to your in-house team and cut the agency loose (or drop to discounted consulting).'
  why_it_matters: 'It flips the buyer/vendor relationship: you''re not renting an outcome, you''re buying a skill you''ll own forever. This protects you from dependency, fragile knowledge, and being held hostage by a vendor who controls your lead flow.'
