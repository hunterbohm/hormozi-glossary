  short_def: Belief in the product, delivered through tone, matters far more than the words of the script.
  full_def: 'Hormozi''s claim that in sales the words are only ~10% and tonality is ~90% — so a genuinely convicted seller can out-close a polished veteran. Since tonality is hard to train quickly, the shortcut is real conviction: read your testimonials out loud daily, only sell a product you''d sell your own mother, and fix the product until you believe in it. In any exchange, the most convicted person usually wins.'
