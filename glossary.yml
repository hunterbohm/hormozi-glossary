- id: commodity-problem
  term: The Commodity Problem (Commoditization)
  aliases:
  - Commoditization
  - Value-Driven vs Price-Driven
  category: offers
  short_def: If your thing can be compared to competitors, you're a commodity and forced to compete on price - so become uncomparable.
  full_def: 'Hormozi''s diagnosis of why most businesses stay broke: they sell price-driven commodities (products available in many places, where buyers just pick the cheapest, like bottled water) instead of value-driven purchases (where buyers want the best, like a surgeon). Competing on price is a race to the bottom. The escape is the Grand Slam Offer, which makes your product incomparable so price comparison becomes impossible. He frames it with ''grow or die'': the market grows ~9%/year, so standing still means falling behind.'
  why_it_matters: 'It names the trap - comparability - and points to the only real exit: differentiate so hard you can''t be price-shopped. It reframes discounting as a symptom of a commodity offer, not a pricing tactic.'
