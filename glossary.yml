- id: urgency
  term: Urgency
  category: offers
  short_def: Using deadlines and time limits to make people act now instead of later.
  full_def: 'Urgency is the time-based twin of scarcity (scarcity = quantity, urgency = time). Its purpose is to compress the decision so prospects buy now rather than ''someday'' (which usually means never). Hormozi''s four mechanisms: (1) cohort-based rolling urgency (classes start on set dates), (2) rolling seasonal urgency (a promo that genuinely ends on a date, rerun each period), (3) pricing- or bonus-based urgency (price rises or a bonus disappears soon), and (4) exploding opportunity (a bigger, time-limited window). His maxim: ''deadlines drive decisions'' - and you must honor real deadlines or lose credibility.'
  components:
  - Cohort-based rolling urgency
  - Rolling seasonal urgency
  - Pricing/bonus-based urgency
  - Exploding opportunity
  why_it_matters: Most 'no's are really 'not now's that never convert. A real deadline forces the decision while desire is high, capturing sales that would otherwise evaporate.
  sources:
  - label: $100M Offers (2021), Ch. 11 & 13 Urgency
