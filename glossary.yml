- id: engaged-lead
  term: Engaged Lead
  aliases:
  - Engaged Leads
  - Warm Lead
  category: leads
  short_def: A lead that shows interest in the stuff you sell — the real output of advertising.
  full_def: 'An engaged lead is a lead who has demonstrated interest by taking an action: opting in, replying, signing up for a demo, registering for a webinar, subscribing, or spending time with your free content. Hormozi''s key distinction is lead vs. engaged lead — a plain lead is just contactable, whereas an engaged lead has raised their hand. He argues that the true purpose of all advertising is not to get leads but to get ENGAGED leads, because interest (not sheer contactability) is what predicts a future purchase. A giant list of unengaged contacts is a vanity metric; a smaller list of engaged leads prints money.'
  why_it_matters: This is the frame that kills the 'big list' delusion. It shifts the goal of every ad, post, and outreach from 'reach' to 'did someone show interest?' — a much higher, more honest bar. Measuring engaged leads (not impressions or list size) tells you whether your advertising is actually working.
