- id: friendship-as-alignment
  term: Friendship (as alignment/degree)
  category: mindset
  short_def: Friendship isn't binary; it's a degree of alignment, and anyone who resents your wins no longer qualifies.
  full_def: 'Hormozi frames friendship as a spectrum judged by alignment and mutual support rather than an on/off label. The boundary line: real friends root for you even behind your back, and anyone who resents your success is out. He treats relationships as investments of abundant exchange and says pruning misaligned, comfort-based ties — some friendships are simply seasonal — clears the way for your goals.'
  why_it_matters: Gives a concrete test (do they celebrate your wins?) for auditing relationships instead of keeping them out of guilt or habit.
