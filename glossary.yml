- id: ghost-products
  term: Ghost Products
  aliases:
  - Sacrificial lambs
  - Ghost product
  category: sales
  short_def: A product you recommend a customer buy somewhere else (or that you don't even carry) purely to make a concession that earns their trust before you sell the high-margin items.
  full_def: A ghost product is a deliberately sacrificed item — often a low-margin product you send the buyer across the street (or to another vendor) to get cheaper — used not to make money on that item but to prove you will act in the customer's interest. Once you make that concession, the buyer trusts your remaining recommendations and buys the high-margin products you keep. Hormozi originally called them sacrificial lambs; he later stopped even carrying the sacrificed products because their real function was as a trust-building sales tool, not inventory.
  components:
