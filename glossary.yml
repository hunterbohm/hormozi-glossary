- id: more-better-new
  term: More, Better, New
  aliases:
  - Do More Before New
  - MBN
  - Core Four On Steroids
  - More Better New
  category: scaling
  short_def: Prioritize growth by first doing MORE of what works, then making it BETTER, and only then adding something NEW.
  full_def: 'Hormozi''s prioritization framework for where to spend effort. Before chasing a new product, channel, or market, exhaust the two cheaper, lower-risk moves: do MORE of what is already working (scale volume on the proven thing) and make it BETTER (improve the existing offer/funnel). NEW is the last resort because it resets your learning curve and splits focus. Often summarized as ''do more before new.'''
  components:
  - More (scale what works)
  - Better (improve what works)
  - New (add something new — last)
  why_it_matters: It counters the entrepreneur's default addiction to novelty. Most growth is left on the table in the 'more' and 'better' buckets; jumping to 'new' feels productive but usually multiplies complexity while dividing results.
