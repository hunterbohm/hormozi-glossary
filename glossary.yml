- id: rule-of-100
  term: The Rule of 100
  aliases:
  - Rule of 100
  category: leads
  short_def: Do 100 primary advertising actions a day, every day, for 100 straight days.
  full_def: 'The Rule of 100 is Hormozi''s volume mandate for guaranteeing lead flow: commit to 100 primary advertising actions per day for 100 consecutive days. Concretely, per Core Four method: Warm Outreach = reach out to 100 people/day; Post Content = create 100 minutes of content/day; Cold Outreach = 100 cold reach-outs/day; Paid Ads = spend $100/day (or 100 minutes managing ads). He argues most people fail not from a bad strategy but from grossly underestimating the volume advertising requires — so the rule removes ''not enough effort'' as a possible excuse.'
  formula: '100 primary advertising actions/day x 100 days (warm: 100 reach-outs; content: 100 minutes; cold: 100 reach-outs; ads: $100/day)'
  components:
