  short_def: How much value your content delivers per unit of time the audience spends on it.
  full_def: 'Value per second is Hormozi''s density metric for content quality: the amount of useful value a viewer/reader gets divided by the time they invest. It''s the engine of the ''Reward'' step in Hook-Retain-Reward — you keep and satisfy attention by cramming maximum value into minimum time (cutting fluff, filler, and dead space). Higher value per second means more sharing, more retention, and a warmer audience.'
