- id: three-generations-frame
  term: The Three Generations Frame (mortality)
  aliases:
  - In three generations everyone will be dead
  - Three generations forgotten
  category: meta
  short_def: In three generations, everyone who knew you — including the people whose opinions stopped you — will be dead and forgotten, so the fear of judgment is already obsolete.
  full_def: 'Hormozi''s recurring mortality lens: zoom out far enough and in roughly three generations everyone who knew you will be dead, including every critic whose judgment you''ve been obeying. He pairs it with the observation that someone can achieve every dream, then die, and two years later nobody cares — the same way you''ve barely thought about the Queen of England since she died. The frame isn''t nihilism; it''s permission. If oblivion is guaranteed, the cost of doing what you actually want is already paid, so the only voice left to satisfy is your own.'
  why_it_matters: It dissolves fear of judgment and social conformity at the root by making the audience that judges you disappear, freeing action without requiring courage. It's a reusable reset for the "what will people think?" loop that stalls most decisions.
  sources:
  - label: How To Move 10x Faster In Life - Alex Hormozi (Chris Williamson)
    url: https://www.youtube.com/watch?v=M4PzOjM5BJQ
  - label: How to Get SO Rich You Realize Money Has No Meaning (Rosetta)
