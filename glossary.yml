- id: choose-your-regrets
  term: Choose Your Regrets (decision frame)
  aliases:
  - In life we must choose our regrets
  - Regrets are baked in
  category: meta
  short_def: Because opportunity cost is baked into existence (you can't split-test life), regret is unavoidable — so the only sane move is to proactively choose which regret you're willing to live with.
  full_def: 'Hormozi argues regret is a structural feature of being human, not a sign of a bad decision: every choice forecloses every other path, so you''ll always carry the open loop of "what if I''d done the other thing." Since you can''t eliminate regret, the real skill is choosing it deliberately — deciding which regret (e.g., the pain of a hard conversation now, vs. the pain of a wasted decade in a job you hate) you''d rather bear, instead of pretending a regret-free option exists.'
  why_it_matters: It reframes the paralyzing fantasy of "the choice with no downside" as impossible by definition, which forces real trade-off thinking. It also turns regret from a verdict on your past into a budgeting exercise for your future — you allocate regret the way you allocate money, to the things you care about least.
