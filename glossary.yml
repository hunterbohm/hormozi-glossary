- id: objection-as-certainty
  term: Objection (a Request for Certainty)
  aliases:
  - Objections are questions
  - Stalls
  - Handling concerns
  category: sales
  short_def: An objection isn't a rejection — it's the prospect asking for enough certainty to feel safe deciding.
  full_def: 'Hormozi reframes objections and stalls (''I need to think about it'') as fear of making a mistake — people avoid deciding so that life makes the choice for them and it isn''t ''their fault.'' So an objection is really a request for more certainty on one of three axes: do they believe it works, do they trust you, and can they afford it. You meet it with curiosity (''what''s your main concern?'') and reassurance, not pressure — because an objection is a question, and no one can disagree with a question.'
