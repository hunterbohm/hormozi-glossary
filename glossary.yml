- id: four-business-constraints
  term: The Four Business Constraints (Leads, Sales, Delivery, Profit)
  aliases:
  - The Four Systems
  - Lead / Sales / Delivery / Profit Systems
  category: scaling
  short_def: 'Every business problem is really one of only four bottlenecks: getting leads, closing them, keeping them, or keeping the cash.'
  full_def: 'In $100M Money Models Hormozi collapses all business constraints into four systems, each with a diagnostic question. Lead System: ''Do you have enough people to sell to?'' Sales System: ''Are you converting the prospects you have?'' Delivery System: ''Do customers stay and buy again?'' (low LTV / high churn). Profit System: ''Does your bank account reflect your hard work?'' (good revenue, no cash). You diagnose which system is constrained, fix that one, then move to the next.'
  formula: 'Constraint is in one of: Leads -> Sales -> Delivery -> Profit'
  components:
  - Lead System
  - Sales System
  - Delivery System
  - Profit System
  why_it_matters: 'It gives the Theory of Constraints a fixed map: instead of a vague hunt, you check four boxes in order. Naming the four also reveals that most founders misdiagnose (they think they have a lead problem when they actually have a retention or pricing problem).'
