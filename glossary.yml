- id: cac
  term: Customer Acquisition Cost (CAC)
  aliases:
  - CAC
  - Cost to acquire a customer
  category: money-models
  short_def: The full cost — ads plus sales — to turn a prospect into one paying customer.
  full_def: 'Hormozi uses CAC as the total marketing and sales spend divided by new customers acquired. He frames it as one half of the two-number engine of a business, paired with LTGP: the LTGP-to-CAC relationship, plus how fast CAC is repaid (payback period), determines whether and how fast you can scale. Because CAC has a hard floor of zero, he argues it offers less leverage than raising LTGP.'
