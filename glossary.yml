  category: leads
  short_def: Other people who advertise for you — the four are customers, employees, agencies, and affiliates.
  full_def: 'Once you''ve maxed out doing the Core Four yourself, the next tier of leverage is getting OTHER people to get leads for you — ''lead getters.'' Hormozi names four: (1) Customers (via referrals / word of mouth), (2) Employees (you hire and train people to run the Core Four), (3) Agencies (external firms you hire — ideally as a paid apprenticeship to learn a skill, then bring it in-house), and (4) Affiliates (independent businesses that promote you to their audiences for a reward). Moving from ''getting leads'' to ''getting lead getters'' is how advertising scales past your personal capacity.'
