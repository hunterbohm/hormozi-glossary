- id: fear
  term: Fear
  category: mindset
  short_def: A signal to examine, not obey — usually an overestimated downside blocking an underestimated upside.
  full_def: 'Hormozi treats fear as information to be defused by specifics: confront it by writing out the actual worst-case scenario, which is almost always survivable and far less severe than the vague dread implied. People overweight the downside of a risk and underestimate the upside, and fear of judgment or failure keeps them from asymmetric bets. The antidote is naming the concrete worst case and acting anyway.'
  why_it_matters: 'Making fear explicit shrinks it: a named worst-case is a manageable problem, while unnamed fear is infinite. It reframes courage not as fearlessness but as taking the action while the feeling is still present — and it reveals most ''risks'' as lopsided bets worth taking.'
  sources:
  - label: 26 Harsh Lessons I Learned in 2025 (Rosetta)
    url: https://rosetta.to/u/alexhormozi/26-harsh-lessons-i-learned-in-2025
  - label: How to Change Your Life (Rosetta)
    url: https://rosetta.to/u/alexhormozi/how-to-change-your-life
  evidence:
  - quote: Fear comes from having something to lose. And so in order to be fearless, we have to come to the realization that nothing in this world belonged to you to begin with.
    source: 15 Brutal Truths I Know at 36 That I Wish I Knew at 20
