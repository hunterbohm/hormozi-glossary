  category: wealth
  short_def: Six ways to get paid, ranked by how much risk you carry — the more (perceived) risk you take, the more you earn.
  full_def: 'Starting from ''there are only four ways to get money — steal, inherit, marry into it, or trade for it,'' Hormozi says the only viable path (trading) can be structured six ways, in ascending reward: (1) I work, then you pay — W2 employment, lowest risk, most reliable; (2) You pay as we go — contractors/vendors, paid in parallel; (3) You pay, then I work — prepayment / layaway, only possible when you have leverage; (4) When X happens, you pay me — rev-share, profit-share, equity, outcome-based pay divorced from time; (5) Buy and sell risk itself — insurance, warranties, guarantees, royalties (you get paid when nothing happens); (6) Control the money flow — payment processors, franchisors, the government/taxes (you get paid no matter what). The through-line: you''re compensated in proportion to the risk you''re willing to take, and the best deals are ones the market PERCEIVES as risky but aren''t (''mispriced bets'').'
  components:
