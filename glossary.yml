  category: leads
  short_def: One-to-one private contact with people who already know you (your warm audience).
  full_def: 'Warm outreach is the first of the Core Four: reaching out one-to-one to people who already know, like, or trust you — friends, family, followers, past and current customers. It''s the cheapest and easiest way to get engaged leads because trust already exists. Hormozi''s method: build your list from phone/email/social, personalize each message, use the A-C-A pattern (Acknowledge, Compliment, Ask) when they reply, and often frame the ask as a referral request (''do you know anyone who...''). His benchmark: roughly 20% engage, ~20% of those take a free offer, and ~1 in 4 of those eventually pay.'
