- id: suffering-and-labeling
  term: Suffering & Labeling
  aliases:
  - The label creates the suffering
  - Suffering is optional
  category: mindset
  short_def: Much suffering isn't caused by events but by the negative labels you attach to normal human experiences.
  full_def: 'Hormozi argues the mind is a ''meaning-making machine'' that labels experiences good or bad to survive — but it upgrades normal, passing states (tired, sad, stressed) into long-standing ''problems'' by labeling one end of a natural continuum as bad. Suffering is therefore optional: between circumstance and response there is choice. You can''t always control the emotion, but you can control the judgment you apply to it — his refrain is simply, ''and that''s okay.'''
