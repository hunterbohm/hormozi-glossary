- id: learning
  term: Learning
  aliases:
  - Same condition, new behavior
  category: mindset
  short_def: Doing something different the next time you face the exact same situation.
  full_def: Hormozi's operational definition of learning is 'same condition, new behavior.' If the same situation recurs and your behavior does not change, you have not learned — no matter what you 'understood.' A skill, in turn, is a chain of these adapted behaviors linked together.
  formula: Learning = same condition + new behavior; Skill = a chain of adapted behaviors
