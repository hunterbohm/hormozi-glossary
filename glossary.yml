- id: ltgp
  term: Lifetime Gross Profit (LTGP)
  aliases:
  - LTGP
  - Lifetime gross profit
  category: money-models
  short_def: The total gross profit one customer produces over their whole relationship with you — the real reinvestable cash, not revenue or LTV.
  full_def: 'Hormozi defines LTGP as the sum of gross profit a customer generates across their lifetime (gross profit per purchase x number of transactions; for recurring models, gross profit divided by churn). He deliberately uses it over the popular ''LTV'': LTV and revenue overstate what you keep because they ignore delivery cost, whereas LTGP is the true cash available to fund acquisition. His framing: CAC is about getting customers, LTGP is about keeping them; CAC can only fall to zero, but LTGP can rise infinitely — so it''s the real ''arms race'' of business.'
  formula: 'LTGP = Gross Profit per purchase x Avg. purchases  (recurring: Gross Profit / Churn %)'
  components:
  - Gross Profit
  - Number of transactions or Churn rate
  why_it_matters: Corrects the vanity of revenue and LTV. Basing acquisition and payback math on gross profit (not top-line) is what stops a business from scaling itself into insolvency, and points effort at retention/margin where the upside is unbounded.
  sources:
  - label: $100M Leads (2023)
    url: ''
