- id: cold-outreach
  term: Cold Outreach
  aliases:
  - Cold Reach Outs
  category: leads
  short_def: One-to-one private contact with strangers who don't yet know you.
  full_def: 'The third Core Four method: contacting strangers directly, one-to-one (cold email, DMs, calls). Because there is no existing trust, cold outreach demands three things: a built/targeted list, immediate personalization plus big fast value (usually a strong lead magnet, not a pitch), and sheer volume with relentless follow-up. Hormozi''s principle here is ''quantity has a quality all its own'' — enough personalized volume makes customer acquisition predictable even with high rejection rates.'
  why_it_matters: It gives founders an aggressive scaling lever that costs time instead of ad budget, and reframes rejection as a volume/math problem rather than a personal one — you just need enough at-bats and follow-ups to catch prospects when their timing is right.
