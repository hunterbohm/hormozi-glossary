- id: exposure-therapy-sales
  term: Exposure Therapy for Sales
  aliases:
  - Make the no the goal
  category: sales
  short_def: Cure fear of rejection by deliberately chasing a high volume of no's until the no stops being scary.
  full_def: Hormozi trains salespeople the way exposure therapy treats phobias, systematically exposing them to the thing they fear (hearing no, saying the price) until it's normalized. By making the no the goal, e.g. go get 100 of them, the rep shifts focus from the outcome to the process and stops being afraid, which is what actually makes them better.
