- id: one-of-zero
  term: One of Zero
  aliases:
  - 1 of 0
  category: meta
  short_def: Doing work no one else will do and things you're not even sure you can do — living beyond others' definitions of you.
  full_def: 'Hormozi contrasts ''one of one'' (doing what only you can do) with ''one of zero'' (doing what no one else will do — and things you''re not even sure you can do yet). Mathematically, one divided by zero is undefined, which is the point: forgo the shoulds, musts, and have-tos others project onto you, and let your actions be the only thing that defines you. It''s his frame for operating beyond convention and beyond definition.'
  why_it_matters: 'It''s a permission structure for originality: stop optimizing to fit others'' expectations and start doing the undefinable work most people avoid. Choosing to be ''one of zero'' means measuring yourself against your own frontier, not the crowd''s playbook.'
