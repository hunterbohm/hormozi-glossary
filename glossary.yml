- id: ltgp-cac-ratio
  term: LTGP:CAC Ratio
  aliases:
  - LTGP to CAC ratio
  - LTV:CAC ratio
  - LTV:CAC
  - LGP to CAC
  - Lifetime Gross Profit to Customer Acquisition Cost
  category: money-models
  short_def: How many dollars of lifetime gross profit you earn per dollar spent acquiring a customer — the health check for a business model.
  full_def: 'Hormozi''s rule of thumb for a durable model: a business with unlimited scale (e.g., software) should aim for at least 3:1 LTGP:CAC, and you add roughly 3 to the ratio for every human you must put in the loop — about 6:1 with one human (sales or delivery), 9:1 with two, 12:1 with three — to absorb the inefficiency people introduce.'
  formula: LTGP / CAC  (~3:1 unlimited-scale; +3 per human in the loop)
  components:
  - 3:1 = healthy floor / no human (unlimited scale)
  - 6:1 = one human in the loop
  - 9:1 = two humans in the loop
  - 12:1 = three humans in the loop
  why_it_matters: Gives one number to judge whether a business is fundamentally sound before optimizing tactics, and explains why labor-heavy businesses need far fatter margins than software just to survive.
