- id: being-is-doing
  term: Being Is Doing (Identity)
  aliases:
  - Be Do Have is BS
  - Just do
  category: mindset
  short_def: You don't 'become' a type of person and then act — identity is just a description of what you repeatedly do.
  full_def: 'Hormozi rejects the ''be-do-have'' self-help sequence. Every identity word (''honest,'' ''hardworking,'' ''disciplined'') is really a description of behaviors: honest = states the facts; hardworking = completes tasks fast. So ''being'' has 100% to do with ''doing'' — do what that type of person does, and people will eventually describe you that way once the evidence catches up. The whole thing collapses to: just do.'
  why_it_matters: 'It makes identity fully controllable and immediate: you don''t need to feel like the person first, you just do their actions and become them by definition. This dissolves ''I''m not the kind of person who...'' as an excuse — traits are just buckets of skills you can start performing today.'
