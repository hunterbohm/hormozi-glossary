  category: offers
  short_def: 'A formula for how much people want something: big dream and high certainty on top, low time and low effort on the bottom.'
  full_def: Hormozi's master formula for perceived value. Value goes UP when you increase the Dream Outcome and the Perceived Likelihood of Achievement, and goes DOWN as Time Delay and Effort & Sacrifice increase. Every element of an offer is judged by whether it moves one of these four variables in the right direction. You do not sell the thing; you sell the ratio.
