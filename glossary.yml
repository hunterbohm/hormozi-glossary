  category: sales
  short_def: The one-to-three sentences you say after any answer that isn't 'yes' to change how the prospect sees their own objection.
  full_def: 'Hormozi defines a reframe as the short response — often a question about their question — that shifts the meaning of a prospect''s objection and keeps you in control (''How many certifications do your trainers have?'' becomes ''Which certifications are you looking for specifically?''). His governing rules: the person asking questions controls the conversation, no one can argue with a question, and you tell the prospect what their objection means (usually: it''s exactly what smart, serious buyers ask).'
