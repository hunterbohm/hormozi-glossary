- id: passion
  term: Passion
  aliases:
  - Passion (follows competence)
  - Don't follow your passion
  category: mindset
  short_def: Not the starting fuel you follow, but the residue of competence and suffering you develop over time.
  full_def: Hormozi attacks 'follow your passion' as backwards and harmful. Passion is rooted in suffering and endurance, and it grows out of competence and deliberate practice — you become passionate about things you get good at, not the reverse. In any pursuit most tasks won't be enjoyable; the rare moments of passion are what make the grind worth it. Start with curiosity and skill-building, and passion follows.
