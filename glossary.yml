- id: anxiety
  term: Anxiety
  aliases:
  - Overwhelm
  category: mindset
  short_def: The feeling you get from having many options but no priorities (or from imagining bad future outcomes you can't control).
  full_def: 'Hormozi redefines anxiety not as a chemical mood but as a decision problem: it comes from having too many options and no priorities, and from projecting imagined negative futures. The fix is mechanical, not medical: prioritize, cut the rest, and make a decision so the mind has one thing to act on instead of many to worry about.'
  why_it_matters: 'Reframing anxiety as ''too many open loops'' turns a vague dread into a to-do: prune options and decide. It relocates the cure from feeling better to acting differently, which you can actually control.'
  sources:
  - label: Alex Hormozi (Facebook, Jan 2025)
