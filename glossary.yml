- id: core-four
  term: The Core Four
  aliases:
  - Core 4
  - The Only Four Ways to Advertise
  category: leads
  short_def: 'The only four ways to let people know about your stuff: warm outreach, post free content, cold outreach, run paid ads.'
  full_def: 'Hormozi claims there are only four ways to advertise, derived from a 2x2 grid of audience (warm = people who know you vs. cold = strangers) crossed with communication style (one-to-one/private vs. one-to-many/public). This yields: Warm Outreach (warm + one-to-one), Post Free Content (warm + one-to-many), Cold Outreach (cold + one-to-one), and Run Paid Ads (cold + one-to-many). He orders them by increasing difficulty and advises beginners to start with warm outreach and content before adding cold outreach and paid ads.'
  formula: '2x2 grid: Audience (warm | cold) x Communication (one-to-one | one-to-many)'
  components:
  - Warm Outreach
  - Post Free Content
  - Cold Outreach
  - Run Paid Ads
  why_it_matters: Collapsing all of marketing into four exhaustive boxes removes overwhelm and shiny-object chasing — every tactic is just a variation of one of the four. It gives a beginner a clear starting sequence and gives a scaling operator a complete map of what they haven't maxed out yet.
