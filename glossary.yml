- id: two-x-bottleneck-test
  term: The 2x Bottleneck Test
  aliases:
  - What Would Break If You Doubled
  - Supply vs Demand Constraint
  category: scaling
  short_def: Ask what would break if your business doubled tomorrow, and that broken thing is the constraint you should fix now.
  full_def: 'Hormozi''s fast diagnostic for locating the constraint: imagine you doubled your leads, ad budget, or headcount overnight. If you could handle the flood and just make more money, you have a demand (marketing/sales) problem. If it would create an unmanageable mess, you have a supply (delivery/capacity) problem. He insists you can have too few customers OR too little capacity, but never both at once, and businesses stall when they keep working on a constraint they already solved.'
  why_it_matters: It turns the abstract idea of 'find your bottleneck' into a concrete thought experiment anyone can run in seconds, and it forces you to see supply and demand as an oscillating pair rather than a single 'growth' knob.
