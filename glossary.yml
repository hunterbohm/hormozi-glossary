- id: intelligence
  term: Intelligence
  aliases:
  - Rate of learning
  - Speed of learning
  category: mindset
  short_def: How fast you change your behavior when facing the same situation — intelligence is a rate, not a fixed trait.
  full_def: 'Hormozi defines learning as ''same condition, new behavior'' and intelligence as the speed of that learning — how few reps (or how little time) it takes you to change what you do. Because it''s a rate, you can beat a ''smarter'' person two ways: change your behavior in fewer iterations, or run more iterations faster (lock in and do ten reps today instead of one a week).'
  formula: Intelligence = speed of behavior change under the same conditions (fewer iterations OR faster iterations)
  components:
  - Learning (same condition, new behavior)
  - Iterations to change
  - Speed of iteration
  why_it_matters: Redefining intelligence as a controllable rate removes the excuse of being 'not smart enough.' Anyone can out-learn a more gifted rival by tightening their feedback loop and increasing volume of reps — it makes intelligence a behavior you buy with focus, not an IQ you're stuck with.
