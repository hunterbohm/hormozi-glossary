- id: commitment-elimination-of-alternatives
  term: Commitment (elimination of alternatives)
  aliases:
  - High commitment, low expectations
  category: mindset
  short_def: Commitment is not intensity of feeling but removing the other options, so staying the course becomes the default.
  full_def: 'Hormozi reframes commitment as an act of subtraction: you stop treating every hard moment as a live choice and eliminate the exits. In his framing, commitment is what remains when alternatives are cut off, which is why high-commitment, low-expectation people persist longer in marriage, business, and other long games.'
  why_it_matters: It turns commitment from emotion into structure. If you remove fallback options, persistence stops depending on mood.
