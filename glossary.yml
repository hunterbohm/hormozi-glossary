- id: gratitude-operation
  term: Gratitude (operationalized)
  aliases:
  - How to feel gratitude
  - Gratitude as playing pretend
  category: meta
  short_def: 'Gratitude is an operation you perform: imagine something good, imagine losing it, then realize you still have it — and the feeling follows.'
  full_def: 'Rather than treating gratitude as a mood you wait for or a virtue you summon, Hormozi turns it into a repeatable mental operation. His version: take something good, mentally simulate losing it, then snap back to the realization that you haven''t lost it — the relief of that contrast is the felt experience of gratitude. He openly calls it "playing pretend," and frames the simplest variant as imagining something terrible and then remembering it hasn''t happened, which lifts you from the bottom of the pool back toward the surface.'
  why_it_matters: 'It makes gratitude an on-demand tool rather than a state you have to catch — you can run the operation anytime to recalibrate. It also ties to his broader "expect nothing → grateful for everything → higher well-being" logic: gratitude is manufactured by contrast, not received by luck.'
