- id: payback-period
  term: Payback Period (30-Day Rule)
  aliases:
  - Payback window
  - PPD
  - Payback period
  - Payback Period (30-Day Rule)
  - CAC Payback
  - Self-Funding Growth
  category: money-models
  short_def: How long it takes to earn back, in gross profit, what you spent to acquire a customer.
  full_def: Hormozi defines the Payback Period as the time for a customer's cumulative gross profit to repay their CAC. His target is 30 days or less, because a one-month payback lets you reinvest the same dollar three times a quarter (~8x growth) versus once for a three-month payback (~2x) — a 4x growth difference from identical capital. He groups it with CAC and LTGP as the 'acquisition trio.'
  formula: Payback = earliest time t where cumulative gross profit through t >= CAC
  why_it_matters: Shows that acquisition speed, not just profitability, is what compounds. Shortening payback multiplies how many times you can recycle cash, making it a bigger growth lever than raising margin.
