- id: the-game
  term: The Game (Infinite Game)
  aliases:
  - Infinite game
  - Outlasting
  category: meta
  short_def: Business and life are infinite games you don't 'win' — you just stay in, so winning becomes a matter of not quitting.
  full_def: 'Hormozi frames business, health, and marriage as infinite games: you don''t win at marriage, you stay married; you don''t win at business, you stay in business. Because you can''t be eliminated except by quitting, the game shifts from ''winning'' to ''outlasting,'' which is a decision you fully control. With enough tolerance for failure, staying in the game long enough makes the eventual payoff nearly certain (see ''volume negates luck'').'
  why_it_matters: 'Seeing the game as infinite changes the goal from a finish line to endurance, which removes the sting of any single loss — a setback only matters if it makes you quit. It''s the frame behind his whole worldview (his podcast is literally ''The Game''): the only unforgivable move is leaving the table.'
