  category: scaling
  short_def: The five traits that make any business easier to grow and more valuable; the more it has, the better the vehicle.
  full_def: 'Hormozi''s scorecard for grading a business (an ''opportunity vehicle''). The five attributes, each a continuum not a binary: (1) Sticky — high revenue retention / recurring revenue; (2) Expensive — high gross margins; (3) Expansion — the market/industry is already growing (tailwind); (4) Operationally scalable — low operational complexity and low capex to add a unit; (5) Unique — a competitive moat that protects pricing power. Very few businesses have all five, and even one makes a business better than its peers.'
