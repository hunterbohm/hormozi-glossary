- id: discipline
  term: Discipline
  category: mindset
  short_def: Being consistent with the things you don't like — anyone can be consistent with what they enjoy.
  full_def: 'Hormozi narrows discipline to a single test: consistency with tasks you dislike. Sticking to things you enjoy isn''t discipline; it''s preference. Real discipline is frustration tolerance — the ability to keep doing the boring, unrewarding work without immediate payoff — which is why most people who ''know what to do'' still don''t do it.'
  why_it_matters: 'It exposes the fake version: if you''re only consistent when it''s fun, you have no discipline yet. Measuring discipline by how you handle the tasks you resist gives you an honest gauge and points training at the real muscle — tolerating discomfort, not summoning motivation.'
  sources:
  - label: Watch This To Get Ahead In 2026 (Rosetta)
    url: https://rosetta.to/u/alexhormozi/watch-this-to-get-ahead-in-2026
  evidence:
  - quote: You're not disciplined if you like the thing you're doing. Discipline is about being able to be consistent with things you don't like.
