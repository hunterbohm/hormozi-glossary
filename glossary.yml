  category: mindset
  short_def: Do so much of the right action that random bad luck can't stop you — enough at-bats guarantees hits.
  full_def: 'Hormozi''s favorite phrase: the more volume of correct actions you take (ads, outreach, content, sales calls, offers), the less any single outcome — or bad luck — matters, because you get enough attempts for the winners to show up. He links it to his ''Rule of 100'' (commit to 100 actions a day for 100 days when starting out) and to the observation that volatility in results is usually a symptom of too-low volume. Top performers, he notes, often do 1,000x more than average, not 2x.'
