- id: deals-die-in-the-details
  term: Deals Die in the Details
  aliases:
  - Details are death traps
  - Deals are lost in the details
  category: sales
  short_def: When a salesperson answers a prospect's detailed, tactical questions directly, the deal falls apart — because answering details surrenders control of what counts as correct and invites nitpicking.
  full_def: 'Hormozi teaches that details are death traps because the moment you give a straight answer to a granular question, you are rolling the dice that your answer is the right one — and you hand the prospect the authority to judge whether it is. Two problems follow: it is not your expertise to settle every operational detail, and the prospect gets to tell you what is right, which kills the close. The remedy is to zoom out to the outcome level and, when asked a detail, answer with a question about their question rather than a blind answer.'
  why_it_matters: It reframes detailed questions as traps rather than progress, so the salesperson stops trying to win the detail debate and instead keeps the conversation at the level of the outcome the buyer actually wants — protecting both authority and the close.
