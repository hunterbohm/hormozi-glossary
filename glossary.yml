  short_def: One-to-many communication to a cold audience — trading money directly for reach.
  full_def: 'The fourth Core Four method: paying platforms (Meta, Google, YouTube, TikTok) to broadcast your message to cold strangers, one-to-many. It''s the fastest and most scalable way to get leads but the riskiest for beginners because you trade money for reach whether or not it works. Hormozi frames it mathematically — you must know your Lifetime Gross Profit and maximum acceptable Customer Acquisition Cost, test systematically (accepting losses in the testing phase), then scale winners aggressively. His line: ''Advertising is the only casino where, with enough skill, you become the house.'''
