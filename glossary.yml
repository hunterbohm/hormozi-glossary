- id: scarcity
  term: Scarcity
  category: offers
  short_def: Limiting the QUANTITY available so people want it more and buy now.
  full_def: 'For Hormozi scarcity is about supply/quantity (contrast with urgency, which is about time). Because people want what they can''t have and fear loss more than they value gain, capping supply raises demand and perceived value. Three engineered types: (1) limited supply of the product/seats, (2) limited supply of bonuses, and (3) never-available-again. The core rule: always keep supply slightly BELOW demand - satisfy too many buyers and you kill desire.'
  components:
  - Limited supply of product
  - Limited supply of bonuses
  - Never available again
