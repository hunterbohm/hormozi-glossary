- id: lead-magnet
  term: Lead Magnet
  aliases:
  - Mini-Offer
  - Free Offer
  category: leads
  short_def: A complete solution to a narrow problem that you give away (free or cheap) to get someone to engage.
  full_def: 'A lead magnet is a complete solution to a narrow problem, given away for free or at low cost in exchange for contact information and engagement. Solving the small problem reveals a bigger, related problem that your core (paid) offer solves — the salty-pretzels-at-a-bar effect: the free thing makes them ''thirsty'' for the paid thing. Hormozi specifies three types: (1) reveal a problem / diagnosis (e.g., a free website-speed test), (2) a sample or free trial, and (3) one step of a multi-step process. And four delivery methods: software/tools, information, services, and physical products. It should be so valuable people feel they should have paid for it, because ''a person who pays with time now is more likely to pay with money later.'''
  components:
  - Reveal a problem (diagnosis)
  - Free sample / trial
  - One step of a multi-step process
  - 'Delivered via: software, information, services, or physical products'
  why_it_matters: The lead magnet is how you convert a much higher percentage of the SAME traffic without spending more on ads — value drops straight to the bottom line. It reframes the first interaction from 'buy my thing' (which most visitors reject) to 'do you want this free thing?' (which multiplies engaged leads 3–5x).
