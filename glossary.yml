- id: problem-solution-cycle
  term: The Problem-Solution Cycle
  aliases:
  - Problem-Solution Cycle
  category: leads
  short_def: Every solution reveals a new problem — so solving one problem for free naturally sets up the next paid one.
  full_def: 'Hormozi''s model for designing lead magnets that lead to the core offer: every problem has a solution, and every solution exposes a new problem. You deliberately pick a narrow problem for your free lead magnet whose solution makes the need for your paid core offer obvious and ''earned.'' Example: a free color consultation (styling) solves ''what colors suit me?'' but reveals ''now what tops/bottoms/outfits?'' — which the paid service handles. Hormozi even applies it to the book itself: it solves lead-gen for sub-$1M businesses, which reveals a scaling problem that Acquisition.com solves.'
  why_it_matters: 'It reframes the lead magnet from a random freebie into a strategic on-ramp: give away the solution to problem A specifically because it creates hunger for solution B (your paid offer). It''s how you give real value for free without cannibalizing the sale.'
