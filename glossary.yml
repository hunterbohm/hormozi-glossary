  - The trust concession it creates
  - The high-margin products you keep and sell on the back of that trust
  why_it_matters: It reframes a lost sale as a trust purchase — giving away a small, low-margin item buys the credibility that closes the big, high-margin sale, so the concession is an investment in the close rather than a cost.
