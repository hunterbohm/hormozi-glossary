- id: advertising
  term: Advertising (Hormozi's definition)
  aliases:
  - Advertise
  category: leads
  short_def: The process of making your stuff known — letting people know about the things you sell.
  full_def: 'Hormozi defines advertising in the plainest possible terms: it is the process of making known. In slightly more words, advertising is simply letting people know about the stuff you sell. He deliberately drops the agency mystique (branding, creative, media theory) so that the core problem becomes obvious — most businesses don''t struggle because their product is bad, they struggle because not enough of the right people know it exists (obscurity). Under this definition there are only four ways to advertise (the Core Four).'
  why_it_matters: 'Defining advertising as ''making known'' reframes a failing business as an obscurity problem, not a quality problem. It makes the solution unambiguous and non-optional: advertise more. It also demystifies marketing enough that a beginner can act today instead of hiring an agency.'
  sources:
  - label: $100M Leads (2023)
    url: ''
