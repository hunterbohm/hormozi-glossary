- id: price-value-discrepancy
  term: Price-Value Discrepancy (Charge What It's Worth)
  aliases:
  - Charge More
  - Charge What It's Worth
  - Premium Pricing
  category: offers
  short_def: Charge based on the value the buyer gets, not your costs - and being the most expensive is an advantage, being second-cheapest never is.
  full_def: 'Hormozi argues you should deliberately create a gap between what a thing costs you to produce and what you charge (up to ~100x cost), pricing to the buyer''s perceived value rather than to ''fair'' cost-plus. Raising price triggers a chain of upside: higher emotional investment, higher perceived value, better client results, more conviction, and better margins to fund fulfillment. His rules: if you can''t be 10x cheaper, don''t compete on price; there''s no advantage to being second-cheapest, but real advantages to being most expensive; and ''those who pay the most, pay the most attention.'''
