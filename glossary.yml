- id: gross-profit
  term: Gross Profit (as Hormozi uses it)
  aliases:
  - Gross profit
  - Gross margin
  category: money-models
  short_def: What's left from a sale after only the cost to make and deliver it — explicitly not net profit or revenue.
  full_def: Hormozi is insistent that Gross Profit = revenue minus the direct cost of producing and delivering the thing sold (COGS/fulfillment), NOT net profit (which subtracts all overhead). A $100 widget costing $20 to deliver has $80 gross profit / 80% gross margin. He uses gross profit — not revenue — as the basis for every acquisition metric (CAC comparisons, LTGP, payback), because it is the real money you actually run the business on.
  formula: Gross Profit = Revenue - Cost of delivering the product/service
  why_it_matters: It's the hinge of all his money math. Confusing gross with net, or sloppily using revenue, makes acquisition look affordable when it isn't; gross profit is the honest number for how much you can spend to get a customer.
  sources:
  - label: $100M Leads (2023)
    url: ''
  - label: $100M Money Models (2025)
    url: ''
  evidence:
  - quote: Lifetime value for a customer is how much they pay you in gross profit over time, and software tends to be virtually 100% gross margins in most businesses.
