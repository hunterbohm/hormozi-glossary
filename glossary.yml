  category: mindset
  short_def: The belief that one perfect choice will carry you all the way, so you overanalyze and never start.
  full_def: 'Hormozi''s name for the overanalysis trap: we wait and wait to find the perfect pick — the one business, one opportunity, one podcast — thinking it will take us all the way. In reality it''s the habit of biting (taking many swings) that compounds, not where you first choose to bite.'
